services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: quata
      POSTGRES_PASSWORD: quata
      POSTGRES_DB: quata
    ports:
      - "5432:5432"
    volumes:
      - quata_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quata"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg2://quata:quata@db:5432/quata
      SECRET_KEY: replace-with-a-very-long-random-string
      BACKEND_CORS_ORIGINS: '["http://localhost:3000","http://frontend:3000"]'
      SEED_ON_STARTUP: "true"
      DEFAULT_ADMIN_EMAIL: admin@quata.digital
      DEFAULT_ADMIN_PASSWORD: ChangeMe!2026
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"

  frontend:
    build: ./frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
    depends_on:
      - backend
    ports:
      - "3000:3000"

volumes:
  quata_pgdata:
