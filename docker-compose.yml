services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: quata
      POSTGRES_PASSWORD: quata
      POSTGRES_DB: quata
    ports:
      - "5432:5432"
    volumes:
      - quata_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quata"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    # NOTE: this compose file is for LOCAL DEV ONLY. Production uses systemd
    # (`quata-digital-backend`) on a single VPS — see deploy.sh and README.md.
    # Defaults below intentionally trip the production-safety guard if anyone
    # tries to run this stack with ENVIRONMENT=production.
    environment:
      ENVIRONMENT: development
      DATABASE_URL: postgresql+psycopg://quata:quata@db:5432/quata
      SECRET_KEY: change-me-in-production-please-make-this-very-long-and-random
      BACKEND_CORS_ORIGINS: '["http://localhost:3000","http://frontend:3000"]'
      AUTO_CREATE_TABLES: "true"
      SEED_ON_STARTUP: "true"
      DEFAULT_ADMIN_EMAIL: admin@quatadigital.com
      DEFAULT_ADMIN_PASSWORD: ChangeMe!2026
      EMAIL_BACKEND: console
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"

  frontend:
    build: ./frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
    depends_on:
      - backend
    ports:
      - "3000:3000"

volumes:
  quata_pgdata:
