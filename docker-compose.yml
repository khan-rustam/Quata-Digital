# ============================================================================
# LOCAL DEVELOPMENT ONLY.
#
# Production runs on a single VPS via systemd + PM2 (see deploy.sh and
# docs/RUNBOOK.md). The hard-coded credentials below intentionally trip
# the production-safety guard (`settings.assert_production_safe`) if
# someone runs this stack with ENVIRONMENT=production — so misuse fails
# at boot rather than going live with `quata:quata` Postgres creds.
#
# All exposed ports bind to 127.0.0.1 so a misconfigured firewall does
# not expose the database to the public internet.
#
# Spin up:   docker compose up        (no profile flag needed for dev)
# ============================================================================

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: quata
      POSTGRES_PASSWORD: quata
      POSTGRES_DB: quata
    ports:
      # Loopback-only: keeps Postgres reachable from the host for psql /
      # IDE tools but invisible to any other interface.
      - "127.0.0.1:5432:5432"
    volumes:
      - quata_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quata"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    environment:
      ENVIRONMENT: development
      DATABASE_URL: postgresql+psycopg://quata:quata@db:5432/quata
      SECRET_KEY: change-me-in-production-please-make-this-very-long-and-random
      BACKEND_CORS_ORIGINS: '["http://localhost:3000","http://frontend:3000"]'
      AUTO_CREATE_TABLES: "true"
      SEED_ON_STARTUP: "true"
      DEFAULT_ADMIN_EMAIL: admin@quatadigital.com
      DEFAULT_ADMIN_PASSWORD: ChangeMe!2026
      EMAIL_BACKEND: console
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "127.0.0.1:8000:8000"

  frontend:
    build: ./frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
    depends_on:
      - backend
    ports:
      - "127.0.0.1:3000:3000"

volumes:
  quata_pgdata:
