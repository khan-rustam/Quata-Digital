name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (pytest + alembic check)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest httpx

      - name: Verify Alembic baseline runs against fresh SQLite
        env:
          DATABASE_URL: sqlite:///./_ci.db
        run: python -m alembic upgrade head

      - name: Boot smoke test (lifespan + /health + login)
        env:
          DATABASE_URL: sqlite:///./_ci_boot.db
          SEED_ON_STARTUP: "true"
        run: |
          python -c "
          from fastapi.testclient import TestClient
          from app.main import app
          with TestClient(app) as c:
              h = c.get('/health'); assert h.status_code == 200, h.text
              print('health ok')
          "

      - name: Pytest
        env:
          DATABASE_URL: sqlite:///./_ci_test.db
        run: pytest -q

      - name: Production-config guard fires
        env:
          ENVIRONMENT: production
        run: |
          python - <<'PY'
          import sys
          from app.core.config import get_settings, ProductionConfigError
          get_settings.cache_clear()
          try:
              from app.main import app  # noqa: F401
              print('FAIL: production boot was not refused', file=sys.stderr)
              sys.exit(1)
          except ProductionConfigError as exc:
              print('OK — guard fired:')
              print(exc)
          PY

  frontend:
    name: Frontend (typecheck + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript typecheck
        run: npx tsc --noEmit

      - name: Lint
        # Treat lint as a hard gate — the codebase ships clean today and
        # any new warning should be surfaced in the PR rather than slipping in.
        run: npm run lint

      - name: Build
        run: npx next build
        env:
          NEXT_TELEMETRY_DISABLED: "1"
